# Phase 23 (v1.4): CI-01/02/03 requirements, consolidated.
#
# build.yml (Build & Type-Check), unit.yml (Vitest), and e2e.yml (Playwright)
# were three independent workflows that all fired in parallel on every event.
# That meant the expensive Playwright suite ran even when a cheap type-check
# failed, and ran twice per PR push (once for `push`, once for `pull_request`).
#
# They are merged here so Playwright `needs` build + unit: a failing
# type-check or unit run short-circuits E2E entirely. The job names are kept
# identical so existing required-status-check rules still match. `push` is
# scoped to `main` only — PR branches are covered by the `pull_request` event,
# which removes the duplicate per-push runs.
name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  change_scope:
    name: Detect CI Scope
    runs-on: ubuntu-latest
    outputs:
      release_only: ${{ steps.classify.outputs.release_only }}
      reason: ${{ steps.classify.outputs.reason }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Classify changed files
        id: classify
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_HEAD_REF: ${{ github.head_ref }}
          COMMIT_TITLE: ${{ github.event.head_commit.message }}
        run: |
          BASE_SHA="${PR_BASE_SHA:-$PUSH_BEFORE_SHA}"
          HEAD_SHA="${PR_HEAD_SHA:-$GITHUB_SHA}"
          node scripts/classify-ci-changes.mjs --base "$BASE_SHA" --head "$HEAD_SHA" --github-output "$GITHUB_OUTPUT" --json
          echo "CI scope reason: $(grep '^reason=' "$GITHUB_OUTPUT" | cut -d= -f2-)"

  build:
    name: Build & Type-Check
    needs: [change_scope]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup pnpm
        uses: pnpm/action-setup@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        if: ${{ needs.change_scope.outputs.release_only != 'true' }}
        run: pnpm build

      - name: Audit CSP (residual meta-CSP scan)
        if: ${{ needs.change_scope.outputs.release_only != 'true' }}
        # v1.7 Phase 39 CONNECT-05 / D16: fail the build if any napplet
        # dist/index.html contains a residual <meta http-equiv="Content-Security-Policy">
        # tag. Shell is the sole CSP authority -- napplets must not ship meta-CSP.
        # See scripts/audit-csp.mjs and SHELL-CONNECT-POLICY.md.
        run: pnpm audit:csp

      - name: Type-check all packages
        if: ${{ needs.change_scope.outputs.release_only != 'true' }}
        run: pnpm type-check

      - name: Docs quality gate
        run: pnpm docs:check

      - name: Verify generated JSR metadata is synced
        if: ${{ needs.change_scope.outputs.release_only == 'true' }}
        run: |
          node scripts/sync-jsr-versions.mjs
          git diff --exit-code -- packages

  unit:
    name: Vitest
    needs: [change_scope]
    if: ${{ needs.change_scope.outputs.release_only != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup pnpm
        uses: pnpm/action-setup@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        run: pnpm test

  e2e_changes:
    name: Detect Playwright Scope
    needs: [change_scope]
    if: ${{ needs.change_scope.outputs.release_only != 'true' }}
    runs-on: ubuntu-latest
    outputs:
      run_e2e: ${{ steps.select.outputs.run_e2e }}
      spec_args: ${{ steps.select.outputs.spec_args }}
      reason: ${{ steps.select.outputs.reason }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Select Playwright tests
        id: select
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
        run: |
          BASE_SHA="${PR_BASE_SHA:-$PUSH_BEFORE_SHA}"
          HEAD_SHA="${PR_HEAD_SHA:-$GITHUB_SHA}"
          node scripts/select-e2e-tests.mjs --base "$BASE_SHA" --head "$HEAD_SHA" --github-output "$GITHUB_OUTPUT" --json
          echo "Playwright selector reason: $(grep '^reason=' "$GITHUB_OUTPUT" | cut -d= -f2-)"

  e2e:
    name: Playwright
    # Gate the expensive E2E suite behind the cheap checks and the changed-file
    # selector. If a PR only changes docs/planning metadata, this required check
    # is skipped by the job condition instead of leaving the whole workflow
    # pending via path filters.
    needs: [change_scope, build, unit, e2e_changes]
    if: ${{ needs.change_scope.outputs.release_only != 'true' && needs.e2e_changes.outputs.run_e2e == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup pnpm
        uses: pnpm/action-setup@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve Playwright version
        id: pw-version
        run: |
          VERSION=$(node -p "require('./node_modules/@playwright/test/package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.pw-version.outputs.version }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-${{ steps.pw-version.outputs.version }}-
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps chromium

      - name: Install system dependencies (cache hit path)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps chromium

      - name: Run Playwright tests
        run: pnpm test:e2e -- ${{ needs.e2e_changes.outputs.spec_args }}
