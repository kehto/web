# Phase 23 (v1.4): CI-01 requirement
name: Build

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Type-Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      - name: Audit CSP (residual meta-CSP scan)
        # v1.7 Phase 39 CONNECT-05 / D16: fail the build if any napplet
        # dist/index.html contains a residual <meta http-equiv="Content-Security-Policy">
        # tag. Shell is the sole CSP authority -- napplets must not ship meta-CSP.
        # See scripts/audit-csp.mjs and SHELL-CONNECT-POLICY.md.
        run: pnpm audit:csp

      - name: Type-check all packages
        run: pnpm type-check

      - name: Docs quality gate
        run: pnpm docs:check
