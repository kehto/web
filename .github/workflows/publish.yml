name: Publish

# Mirrors napplet/web's Changesets automation:
# - feature PR merges with pending .changeset/*.md files update/create a
#   "Version Packages" PR against main
# - merging that version PR publishes npm packages, then publishes matching JSR
#   packages through OIDC
# - CI owns validation on the main commit; this workflow starts only after CI
#   succeeds and does not rerun unit/docs/Playwright gates.
#
# The tag-triggered release.yml remains as a manual/tag fallback path.

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - run: pnpm install --frozen-lockfile

      # Trusted Publishing is implemented in npm >= 11.5.1. Node 22 can ship an
      # older npm, so upgrade before changeset publish shells out to npm.
      - name: Upgrade npm to an OIDC-capable version
        run: npm install -g npm@latest

      - name: Create Release Pull Request or Publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
          publish: pnpm publish-packages
        env:
          GITHUB_TOKEN: ${{ secrets.CHANGESETS_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Sync jsr.json versions
        if: steps.changesets.outputs.published == 'true'
        run: node scripts/sync-jsr-versions.mjs

      - name: Publish to JSR (topologically ordered)
        if: steps.changesets.outputs.published == 'true'
        run: pnpm -r --workspace-concurrency=1 --filter='./packages/*' exec npx jsr publish --allow-slow-types --allow-dirty
