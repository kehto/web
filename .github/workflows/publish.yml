name: Publish

# Changesets "Version Packages" PR automation (versioning only — does NOT publish).
#
# - A feature PR merging with pending .changeset/*.md files makes this workflow
#   create or update the "Version Packages" PR against main (changeset version +
#   jsr.json sync).
# - Merging that Version Packages PR bumps package.json/jsr.json and writes
#   changelogs. It does NOT publish here.
#
# Publishing to npm + JSR is owned entirely by the tag-triggered release.yml,
# which holds the npm OIDC Trusted Publisher. To publish a release after the
# Version Packages PR merges, push a `v*` tag (or run release.yml via
# workflow_dispatch). npm Trusted Publishing keys on the workflow filename, so
# only one workflow can publish a given package — keeping publishing in
# release.yml avoids the 404 that the unregistered workflow gets.
#
# CI owns validation on the main commit; this workflow starts only after CI
# succeeds and does not rerun unit/docs/Playwright gates.

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  version:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha }}
          submodules: recursive

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # No `publish:` input — this workflow only opens/updates the Version
      # Packages PR. Publishing is release.yml's responsibility (it owns the npm
      # OIDC Trusted Publisher). With no pending changesets, changesets/action is
      # a no-op here instead of attempting an unauthorized npm publish.
      - name: Create or update the Version Packages PR
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
        env:
          GITHUB_TOKEN: ${{ secrets.CHANGESETS_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
