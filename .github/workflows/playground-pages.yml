name: Publish Web to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: github-pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build web Pages artifact
    runs-on: ubuntu-latest
    env:
      PLAYGROUND_BASE_PATH: /web/playground/
      VITEPRESS_BASE: /web/docs/
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages for Pages
        run: pnpm build

      - name: Rebuild playground shell with Pages base
        run: pnpm --filter @kehto/playground build

      - name: Type-check all packages
        run: pnpm type-check

      - name: Docs quality gate with Pages base
        run: pnpm docs:check

      - name: Audit gateway artifacts
        run: pnpm audit:gateway-artifacts

      - name: Pack web Pages artifact
        run: pnpm build:pages

      - name: Audit web Pages artifact
        run: pnpm audit:pages

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: .pages

  deploy:
    name: Deploy web to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages artifact
        id: deployment
        uses: actions/deploy-pages@v4
