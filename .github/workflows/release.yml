# Phase 25 (v1.4): CI-04 requirement
# Tag-triggered (and manually dispatchable) release workflow — runs
# `pnpm changeset publish` via npm OIDC Trusted Publishing (no NPM_TOKEN),
# then `npx jsr publish` via JSR OIDC. CI owns test validation before release;
# this workflow builds publish artifacts but does not rerun unit or Playwright.
#
# A manual `workflow_dispatch` can finish a partial release — e.g. publish JSR
# packages created after the original tag run. npm/JSR skip already-published
# versions, so dispatch is a safe recovery path for an already-validated commit.
name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      skip_npm:
        description: 'Skip npm publish for registry-repair dispatches; tag releases always publish npm'
        type: boolean
        default: false
      jsr_filter:
        description: 'Space-separated pnpm filters for JSR repair dispatches (default: ./packages/*)'
        type: string
        default: './packages/*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false  # release runs are serialized; never cancel mid-publish

permissions:
  contents: write  # needed to push tags/release commits if changeset creates them
  id-token: write  # REQUIRED: mints the OIDC token npm exchanges for Trusted Publishing

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so changeset can read version state
          submodules: recursive

      - uses: pnpm/action-setup@v3

      - uses: actions/setup-node@v4
        with:
          node-version: '22'  # OIDC Trusted Publishing requires Node >= 22.14.0
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      - name: Type-check all packages
        run: pnpm type-check

      # Trusted Publishing is implemented in the npm CLI (>= 11.5.1); Node 22.14
      # still ships npm 10.x, so upgrade the npm that `changeset publish` shells out to.
      - name: Upgrade npm to an OIDC-capable version
        run: npm install -g npm@latest

      # No NPM_TOKEN: with `id-token: write` and a configured trusted publisher,
      # npm exchanges the OIDC token for a short-lived publish credential and
      # attaches provenance automatically (public repo + public package).
      - name: Publish to npm (OIDC Trusted Publishing)
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.skip_npm) }}
        run: pnpm changeset publish

      # ── JSR publish ─────────────────────────────────────────────────────────
      # JSR publishes from the SAME tag as npm, reading the same package.json
      # versions, so the two registries stay in lockstep (no version-skew window
      # that a push-to-main JSR trigger would open). JSR auths via the job's
      # `id-token: write` OIDC — no JSR_TOKEN secret — once each @kehto/* package
      # is linked to kehto/web under the @kehto scope at jsr.io.
      #
      # `if: always()` so a non-fatal npm hiccup (e.g. an already-published
      # version, which `changeset publish` treats as success anyway) never
      # silently skips the JSR release.

      # Idempotent — copies each packages/*/package.json#version into the sibling
      # jsr.json#version and pins internal @kehto/* import constraints to the
      # current versions. Guards against a hand-edited package.json that skipped
      # `pnpm version-packages`.
      - name: Sync jsr.json versions
        if: always()
        run: node scripts/sync-jsr-versions.mjs

      # `pnpm -r exec` runs in topological order (respects workspace deps), so
      # @kehto/acl + @kehto/firewall publish before @kehto/runtime, which
      # publishes before @kehto/shell + @kehto/services. Each package's
      # `npx jsr publish` then resolves prior packages from JSR's registry.
      #
      # --workspace-concurrency=1 is REQUIRED: pnpm's default recursive
      # concurrency runs the `npx jsr` invocations in parallel, which both
      # (a) lets JSR reject dependents whose deps aren't on the registry yet and
      # (b) races concurrent `npx jsr` processes on the shared npx binary-download
      # cache. Serializing to 1 runs packages strictly in topological order.
      #
      # --allow-slow-types relaxes JSR's strict type-inference checks until the
      # public type exports are tightened (tracked separately).
      # --allow-dirty tolerates the sync step's jsr.json edits without a commit.
      - name: Publish to JSR (topologically ordered)
        if: always()
        env:
          JSR_FILTERS: ${{ github.event_name == 'workflow_dispatch' && inputs.jsr_filter || './packages/*' }}
        run: |
          filter_args=()
          for filter in $JSR_FILTERS; do
            filter_args+=(--filter="$filter")
          done

          pnpm -r --workspace-concurrency=1 "${filter_args[@]}" exec npx jsr publish --allow-slow-types --allow-dirty
