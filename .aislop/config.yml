version: 1
engines:
  format: true
  lint: true
  code-quality: true
  ai-slop: true
  architecture: false
  security: true
quality:
  maxFunctionLoc: 150
  maxFileLoc: 700
  maxNesting: 5
  maxParams: 6
lint:
  typecheck: false
security:
  # Dependency-vulnerability auditing is intentionally OFF for the quality badge.
  #
  # aislop's security engine runs a live `pnpm audit`, so the score changes
  # whenever a new advisory is published against any (transitive) dependency —
  # independent of this repo's code. In practice every advisory it surfaced was
  # against build-time devDependencies (esbuild, vite, js-yaml, launch-editor),
  # several platform-specific (Windows) and none shipped to users. That made the
  # badge non-deterministic and disconnected from code quality — it kept dropping
  # no matter how clean the source was.
  #
  # This badge measures CODE quality (format, lint, complexity, ai-slop). Supply-
  # chain vulnerability tracking belongs in a dedicated, non-blocking job
  # (`pnpm audit` in CI / Dependabot), not gated on the quality badge.
  audit: false
  auditTimeout: 25000
scoring:
  weights:
    format: 0.3
    lint: 0.6
    code-quality: 0.8
    ai-slop: 2.5
    architecture: 1
    security: 1.5
  thresholds:
    good: 75
    ok: 50
  smoothing: 20
ci:
  failBelow: 50
  format: json
telemetry:
  enabled: false
