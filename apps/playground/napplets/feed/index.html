<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="napplet-napp-type" content="demo-feed" />
  <title>Feed Napplet</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'JetBrains Mono', monospace;
      background: var(--nap-theme-background, #f6f5ef);
      color: var(--nap-theme-text, #1c1c1c);
      font-size: 11px;
      height: 100vh;
      overflow: hidden;
    }
    #app {
      height: 100%;
      display: flex;
      flex-direction: column;
      padding: 8px;
      gap: 6px;
    }
    .feed-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .feed-status {
      color: var(--nap-theme-muted, #666);
      font-size: 10px;
      padding: 2px 0;
    }
    #feed-list {
      list-style: none;
      flex: 1;
      overflow-y: auto;
      padding: 6px;
      border: 1px solid transparent;
      background: transparent;
      margin: 0;
    }
    .feed-item {
      display: flex;
      align-items: flex-start;
      gap: 6px;
      padding: 4px 0;
      border-bottom: 1px solid var(--nap-theme-border, #cfcabf);
      color: var(--nap-theme-text, #2a2a2a);
      line-height: 1.4;
    }
    .feed-item:last-child { border-bottom: none; }
    .feed-item-avatar {
      width: 20px;
      height: 20px;
      flex: 0 0 20px;
      border-radius: 999px;
      overflow: hidden;
      border: 1px solid transparent;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 1px;
    }
    .feed-item-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .feed-item-avatar-fallback {
      color: var(--nap-theme-muted, #666);
      font-size: 9px;
      line-height: 1;
    }
    .feed-profile-button {
      appearance: none;
      border: 0;
      background: transparent;
      color: inherit;
      font: inherit;
      padding: 0;
      cursor: pointer;
    }
    .feed-profile-button:hover,
    .feed-profile-button:focus-visible {
      color: var(--nap-theme-text, #1a1a1a);
      text-decoration: underline;
    }
    .feed-profile-avatar-button {
      flex: 0 0 20px;
      margin-top: 1px;
      text-decoration: none;
    }
    .feed-profile-avatar-button:hover,
    .feed-profile-avatar-button:focus-visible {
      outline: 1px solid var(--nap-theme-primary, #7a7a7a);
      outline-offset: 2px;
      border-radius: 999px;
    }
    .feed-profile-avatar-button .feed-item-avatar {
      margin-top: 0;
    }
    .feed-item-body {
      flex: 1;
      min-width: 0;
    }
    .feed-item-meta {
      display: flex;
      align-items: baseline;
      gap: 6px;
      min-width: 0;
      margin-bottom: 1px;
    }
    .feed-item-author {
      color: var(--nap-theme-text, #2a2a2a);
      font-size: 10px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-width: 0;
    }
    .feed-item-time {
      color: var(--nap-theme-muted, #666);
      font-size: 9px;
      flex: 0 0 auto;
    }
    .feed-item-content {
      display: block;
      color: var(--nap-theme-text, #2a2a2a);
      overflow-wrap: anywhere;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="feed-row">
      <span id="feed-status">connecting...</span>
    </div>
    <ul id="feed-list"></ul>
  </div>
  <script type="module" src="./src/main.ts"></script>
</body>
</html>
