<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="napplet-napp-type" content="demo-cvm" />
  <title>CVM Relatr Napplet</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'JetBrains Mono', monospace;
      background: var(--nap-theme-background, #f6f5ef);
      color: var(--nap-theme-text, #1c1c1c);
      font-size: 11px;
      height: 100vh;
      overflow: hidden;
    }
    #app { height: 100%; display: flex; flex-direction: column; padding: 8px; gap: 6px; min-height: 0; }
    #cvm-status { color: var(--nap-theme-muted, #666); font-size: 10px; }
    #cvm-server {
      font-size: 10px;
      color: var(--nap-theme-muted, #666);
      border-bottom: 1px solid var(--nap-theme-border, #c9c6ba);
      padding-bottom: 4px;
    }
    #cvm-server strong { color: var(--nap-theme-text, #1c1c1c); }
    .cvm-controls { display: flex; gap: 4px; }
    #cvm-target {
      flex: 1 1 auto;
      min-width: 0;
      font: 10px/1.4 'JetBrains Mono', monospace;
      padding: 4px;
      border: 1px solid var(--nap-theme-border, #c9c6ba);
      background: var(--nap-theme-surface-2, #ece9df);
      color: var(--nap-theme-text, #1c1c1c);
    }
    #cvm-run {
      font: 10px/1.4 'JetBrains Mono', monospace;
      padding: 4px 8px;
      border: 1px solid var(--nap-theme-border, #c9c6ba);
      background: var(--nap-theme-primary, #7aa2f7);
      color: var(--nap-theme-background, #fff);
      cursor: pointer;
    }
    #cvm-run:disabled { opacity: 0.5; cursor: default; }
    #cvm-score-stage {
      flex: 1 1 auto;
      min-height: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }
    #cvm-score { font-size: 40px; font-weight: 700; color: var(--nap-theme-primary, #7aa2f7); }
    #cvm-score-label { font-size: 10px; color: var(--nap-theme-muted, #666); }
  </style>
</head>
<body>
  <div id="app">
    <div id="cvm-status">connecting...</div>
    <div id="cvm-server">discovering ContextVM server…</div>
    <div class="cvm-controls">
      <input id="cvm-target" type="text" spellcheck="false" placeholder="target pubkey (hex)" />
      <button id="cvm-run" type="button">trust score</button>
    </div>
    <div id="cvm-score-stage">
      <div id="cvm-score">—</div>
      <div id="cvm-score-label">trust score (0–1) via MCP over Nostr</div>
    </div>
  </div>
  <script type="module" src="./src/main.ts"></script>
</body>
</html>
