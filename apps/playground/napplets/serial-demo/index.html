<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="napplet-napp-type" content="demo-serial" />
  <title>Serial Demo Napplet</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'JetBrains Mono', monospace;
      background: var(--nap-theme-background, #f6f5ef);
      color: var(--nap-theme-text, #1c1c1c);
      font-size: 11px;
      height: 100vh;
      overflow: hidden;
    }
    #app {
      height: 100%;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 8px;
      padding: 8px;
      min-height: 0;
    }
    #serial-demo-status {
      color: var(--nap-theme-muted, #666);
      font-size: 10px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    #serial-demo-results {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 6px;
      min-height: 0;
    }
    .result {
      border: 1px solid var(--nap-theme-border, #c9c6ba);
      background: var(--nap-theme-surface-2, #ece9df);
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 3px;
      padding: 6px;
      min-width: 0;
    }
    .label {
      color: var(--nap-theme-muted, #666);
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .value {
      color: var(--nap-theme-text, #1c1c1c);
      font-size: 13px;
      font-weight: 700;
      overflow-wrap: anywhere;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="serial-demo-status">connecting...</div>
    <div id="serial-demo-results">
      <div class="result">
        <span class="label">opened</span>
        <span id="serial-demo-opened" class="value">pending</span>
      </div>
      <div class="result">
        <span class="label">written</span>
        <span id="serial-demo-written" class="value">pending</span>
      </div>
      <div class="result">
        <span class="label">closed</span>
        <span id="serial-demo-closed" class="value">pending</span>
      </div>
    </div>
  </div>
  <script type="module" src="./src/main.ts"></script>
</body>
</html>
