<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="napplet-napp-type" content="demo-profile-viewer" />
  <title>Profile Viewer Napplet</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'JetBrains Mono', monospace;
      background: var(--nap-theme-background, #f6f5ef);
      color: var(--nap-theme-text, #1c1c1c);
      font-size: 11px;
      height: 100vh;
      overflow: hidden;
    }
    #app {
      height: 100%;
      display: flex;
      flex-direction: column;
      padding: 8px;
      gap: 8px;
    }
    .profile-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .profile-title {
      color: var(--nap-theme-muted, #666);
      font-size: 9px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }
    #profile-status {
      color: var(--nap-theme-muted, #666);
      font-size: 10px;
      white-space: nowrap;
    }
    .profile-main {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      min-height: 72px;
    }
    #profile-picture {
      width: 42px;
      height: 42px;
      flex: 0 0 42px;
      border-radius: 6px;
      object-fit: cover;
      display: none;
      border: 1px solid var(--nap-theme-border, #cfcabf);
      background: var(--nap-theme-surface-1, #f4f1e7);
    }
    .profile-copy {
      min-width: 0;
      flex: 1;
    }
    #profile-name {
      color: var(--nap-theme-text, #1a1a1a);
      font-size: 13px;
      font-weight: 600;
      line-height: 1.3;
      overflow-wrap: anywhere;
    }
    #profile-pubkey {
      display: block;
      color: var(--nap-theme-info, #666666);
      font-size: 9px;
      line-height: 1.4;
      overflow-wrap: anywhere;
      margin-top: 2px;
    }
    #profile-about {
      color: var(--nap-theme-text, #2a2a2a);
      font-size: 10px;
      line-height: 1.45;
      overflow-wrap: anywhere;
    }
    #profile-details {
      display: flex;
      flex-direction: column;
      gap: 3px;
      min-height: 14px;
    }
    .profile-detail-row {
      display: flex;
      align-items: baseline;
      gap: 6px;
      min-width: 0;
    }
    .profile-detail-label {
      color: var(--nap-theme-muted, #666);
      flex: 0 0 36px;
      font-size: 9px;
    }
    .profile-detail-value {
      color: var(--nap-theme-text, #2a2a2a);
      font-size: 10px;
      overflow-wrap: anywhere;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="profile-header">
      <span class="profile-title">profile</span>
      <span id="profile-status">connecting...</span>
    </div>
    <div class="profile-main">
      <img id="profile-picture" alt="profile" />
      <div class="profile-copy">
        <div id="profile-name"></div>
        <span id="profile-pubkey"></span>
      </div>
    </div>
    <div id="profile-about"></div>
    <div id="profile-details"></div>
  </div>
  <script type="module" src="./src/main.ts"></script>
</body>
</html>
