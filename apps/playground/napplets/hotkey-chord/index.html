<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="napplet-napp-type" content="demo-hotkey-chord" />
  <title>Hotkey-Chord Napplet</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'JetBrains Mono', monospace;
      background: var(--nap-theme-background, #f6f5ef);
      color: var(--nap-theme-text, #1c1c1c);
      font-size: 11px;
      height: 100vh;
      overflow: hidden;
    }
    #app {
      height: 100%;
      display: flex;
      flex-direction: column;
      padding: 8px;
      gap: 6px;
    }
    .hotkey-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .hotkey-status {
      color: var(--nap-theme-muted, #666);
      font-size: 10px;
      padding: 2px 0;
    }
    .hotkey-chord-hint {
      color: var(--nap-theme-muted, #666);
      font-size: 10px;
      padding: 4px 6px;
      border: 1px dashed var(--nap-theme-border, #c9c6ba);
      background: var(--nap-theme-surface-2, #ece9df);
    }
    .hotkey-metric {
      display: flex;
      justify-content: space-between;
      padding: 4px 6px;
      border: 1px solid var(--nap-theme-border, #c9c6ba);
      background: var(--nap-theme-surface-2, #ece9df);
    }
    .hotkey-metric-label { color: var(--nap-theme-muted, #666); }
    .hotkey-metric-value { color: var(--nap-theme-success, #39ff14); font-weight: bold; }
    #hotkey-chord-log {
      flex: 1;
      overflow-y: auto;
      background: var(--nap-theme-surface-2, #ece9df);
      border: 1px solid var(--nap-theme-border, #c9c6ba);
      padding: 6px;
      font-size: 10px;
    }
    .hotkey-log-entry {
      padding: 1px 0;
      line-height: 1.4;
      color: var(--nap-theme-muted, #666);
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="hotkey-row">
      <span id="hotkey-chord-status" class="hotkey-status">connecting...</span>
    </div>
    <div class="hotkey-chord-hint">Press <kbd>Ctrl+Shift+K</kbd> to trigger the subscribed chord.</div>
    <div class="hotkey-metric">
      <span class="hotkey-metric-label">Deliveries:</span>
      <span id="hotkey-chord-count" class="hotkey-metric-value">0</span>
    </div>
    <div class="hotkey-metric">
      <span class="hotkey-metric-label">Last chord:</span>
      <span id="hotkey-chord-last" class="hotkey-metric-value">—</span>
    </div>
    <div id="hotkey-chord-log"></div>
  </div>
  <script type="module" src="./src/main.ts"></script>
</body>
</html>
