<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="napplet-napp-type" content="demo-bot" />
  <title>Bot Napplet</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'JetBrains Mono', monospace;
      background: var(--nap-theme-background, #0a0a0f);
      color: var(--nap-theme-text, #e0e0e0);
      font-size: 11px;
      height: 100vh;
      overflow: hidden;
    }
    #app {
      height: 100%;
      display: flex;
      flex-direction: column;
    }
    #status {
      padding: 4px 8px;
      background: var(--nap-theme-surface-1, #12121a);
      border-bottom: 1px solid var(--nap-theme-border, #2a2a3a);
      color: var(--nap-theme-muted, #555);
      font-size: 10px;
      display: flex;
      justify-content: space-between;
    }
    #log {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }
    .log-entry { padding: 2px 0; line-height: 1.4; }
    .log-heard { color: var(--nap-theme-warning, #ffbf00); }
    .log-replied { color: var(--nap-theme-success, #39ff14); }
    .log-learned { color: var(--nap-theme-accent-secondary, #b388ff); }
    .log-error { color: var(--nap-theme-danger, #ff3b3b); }
    .log-info { color: var(--nap-theme-muted, #555); }
    #rules {
      padding: 4px 8px;
      background: var(--nap-theme-surface-1, #12121a);
      border-top: 1px solid var(--nap-theme-border, #2a2a3a);
      max-height: 60px;
      overflow-y: auto;
      font-size: 10px;
      color: var(--nap-theme-muted, #555);
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="status">
      <span id="status-text">connecting...</span>
      <span id="rule-count">0 rules</span>
    </div>
    <div id="log"></div>
    <div id="rules"></div>
  </div>
  <script type="module" src="./src/main.ts"></script>
</body>
</html>
