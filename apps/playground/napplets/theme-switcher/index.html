<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="napplet-napp-type" content="demo-theme-switcher" />
  <title>Theme Switcher Napplet</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'JetBrains Mono', monospace;
      background: #0a0a0f;
      color: #e0e0e0;
      font-size: 11px;
      height: 100vh;
      overflow: hidden;
    }
    #app {
      height: 100%;
      display: flex;
      flex-direction: column;
      padding: 6px;
      gap: 4px;
    }
    .theme-row { display: flex; align-items: center; gap: 6px; padding: 2px 0; }
    .theme-row-wrap { flex-wrap: wrap; }
    .theme-discovery-row { gap: 5px; }
    .theme-discovery-row .theme-btn { padding: 3px 8px; font-size: 10px; }
    #theme-status { color: #888; font-size: 10px; flex: 1 1 64px; min-width: 0; }
    .theme-btn {
      background: #1a1a2e; border: 1px solid #3a3a5a; color: #e0e0e0;
      padding: 4px 12px; font-family: inherit; font-size: 11px; cursor: pointer;
    }
    .theme-btn:hover { background: #2a2a4e; }
    .theme-btn[data-active='true'] {
      background: #39ff14; border-color: #39ff14; color: #0a0a0f;
    }
    .theme-btn:disabled { opacity: 0.55; cursor: default; }
    #theme-custom-color { width: 32px; height: 24px; padding: 0; border: 1px solid #3a3a5a; cursor: pointer; }
    .theme-toggle {
      display: inline-flex; align-items: center; gap: 4px; color: #9aa0aa;
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em;
    }
    .theme-toggle input { width: 12px; height: 12px; accent-color: #39ff14; }
    #theme-catalog {
      list-style: none; display: flex; flex-direction: column; gap: 4px;
      min-height: 44px; max-height: 116px; overflow-y: auto;
      border-top: 1px solid #2a2a3a; padding-top: 6px;
    }
    .theme-catalog-empty { color: #666; font-size: 10px; padding: 4px 0; }
    .theme-catalog-item {
      display: grid; grid-template-columns: 30px minmax(0, 1fr) auto;
      align-items: center; gap: 6px; padding: 4px;
      border: 1px solid #24243a; background: rgba(18, 18, 30, 0.72);
    }
    .theme-catalog-item[data-active='true'] { border-color: #39ff14; }
    .theme-swatch { display: flex; width: 30px; height: 20px; border: 1px solid #3a3a5a; overflow: hidden; }
    .theme-swatch span { flex: 1; }
    .theme-catalog-body { min-width: 0; display: flex; flex-direction: column; gap: 2px; }
    .theme-catalog-title { color: #d6dae3; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .theme-catalog-meta { color: #6c7486; font-size: 9px; text-transform: uppercase; letter-spacing: 0.08em; }
    .theme-apply-btn { padding: 3px 6px; font-size: 10px; }
    #theme-log { overflow-y: auto; max-height: 70px; border-top: 1px solid #2a2a3a; padding-top: 4px; font-size: 10px; color: #555; margin-top: 2px; }
    .theme-log-entry { padding: 1px 0; line-height: 1.4; }
  </style>
</head>
<body>
  <div id="app">
    <div class="theme-row theme-row-wrap theme-discovery-row">
      <span id="theme-status">connecting...</span>
      <button id="theme-discover-btn" class="theme-btn" type="button">Refresh</button>
      <label class="theme-toggle"><input id="theme-show-wot" type="checkbox" checked /> WoT</label>
      <label class="theme-toggle"><input id="theme-show-global" type="checkbox" checked /> Global</label>
    </div>
    <div class="theme-row">
      <button id="theme-light-btn" class="theme-btn" data-theme="light">Light</button>
      <button id="theme-dark-btn"  class="theme-btn" data-theme="dark">Dark</button>
      <button id="theme-custom-btn" class="theme-btn" data-theme="custom">Custom</button>
      <input id="theme-custom-color" type="color" value="#1a1a2e" />
    </div>
    <ul id="theme-catalog" aria-label="Discovered themes"></ul>
    <div id="theme-log"></div>
  </div>
  <script type="module" src="./src/main.ts"></script>
</body>
</html>
