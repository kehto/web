<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="napplet-napp-type" content="demo-resource" />
  <title>Resource Demo Napplet</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'JetBrains Mono', monospace;
      background: var(--nap-theme-background, #f6f5ef);
      color: var(--nap-theme-text, #1c1c1c);
      font-size: 11px;
      height: 100vh;
      overflow: hidden;
    }
    #app {
      height: 100%;
      display: flex;
      flex-direction: column;
      padding: 8px;
      gap: 6px;
      min-height: 0;
    }
    #resource-demo-status { color: var(--nap-theme-muted, #666); font-size: 10px; }
    #resource-demo-stage {
      flex: 1 1 auto;
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    #resource-demo-image {
      flex: 1 1 auto;
      min-height: 0;
      width: 100%;
      object-fit: contain;
      display: block;
      border: 1px solid var(--nap-theme-border, #c9c6ba);
      background: var(--nap-theme-surface-2, #ece9df);
    }
    #resource-demo-source {
      font-size: 10px;
      color: var(--nap-theme-muted, #666);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    #resource-demo-bulk {
      font-size: 10px;
      color: var(--nap-theme-muted, #666);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="resource-demo-status">connecting...</div>
    <div id="resource-demo-stage">
      <img id="resource-demo-image" alt="remote resource preview" />
      <div id="resource-demo-source">loading remote image...</div>
      <div id="resource-demo-bulk">bulk pending</div>
    </div>
  </div>
  <script type="module" src="./src/main.ts"></script>
</body>
</html>
