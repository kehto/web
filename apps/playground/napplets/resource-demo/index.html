<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="napplet-napp-type" content="demo-resource" />
  <title>Resource Demo Napplet</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'JetBrains Mono', monospace;
      background: #0a0a0f;
      color: #e0e0e0;
      font-size: 11px;
      height: 100vh;
      overflow: hidden;
    }
    #app {
      height: 100%;
      display: flex;
      flex-direction: column;
      padding: 8px;
      gap: 6px;
    }
    #resource-demo-status { color: #888; font-size: 10px; }
    section { display: flex; flex-direction: column; gap: 3px; }
    section h2 {
      font-size: 10px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    #resource-demo-granted,
    #resource-demo-denied {
      flex: 1;
      overflow-y: auto;
      padding: 6px;
      border: 1px solid #1e1e2e;
      background: #0d0d14;
      font-size: 10px;
      white-space: pre-wrap;
      word-break: break-all;
      color: #b0b0c0;
      min-height: 60px;
    }
    #resource-demo-log {
      max-height: 80px;
      overflow-y: auto;
      background: #0d0d14;
      border: 1px solid #1e1e2e;
      padding: 6px;
      font-size: 10px;
      color: #888;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="resource-demo-status">connecting...</div>
    <section>
      <h2>granted fetch (playground origin)</h2>
      <!-- sentinel: E2E-25 asserts #resource-demo-granted via frameLocator (Plan 40-03) -->
      <pre id="resource-demo-granted">(pending)</pre>
    </section>
    <section>
      <h2>denied fetch (untrusted.example)</h2>
      <!-- sentinel: E2E-25 asserts #resource-demo-denied via frameLocator (Plan 40-03) -->
      <pre id="resource-demo-denied">(pending)</pre>
    </section>
    <div id="resource-demo-log"></div>
  </div>
  <script type="module" src="./src/main.ts"></script>
</body>
</html>
