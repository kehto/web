<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="napplet-napp-type" content="demo-chat" />
  <title>Chat Napplet</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'JetBrains Mono', monospace;
      background: var(--nap-theme-background, #0a0a0f);
      color: var(--nap-theme-text, #e0e0e0);
      font-size: 11px;
      height: 100vh;
      overflow: hidden;
    }
    #app {
      height: 100%;
      display: flex;
      flex-direction: column;
    }
    #chat-status {
      padding: 4px 8px;
      background: var(--nap-theme-surface-1, #12121a);
      border-bottom: 1px solid var(--nap-theme-border, #2a2a3a);
      color: var(--nap-theme-muted, #555);
      font-size: 10px;
    }
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }
    .msg {
      padding: 2px 0;
      line-height: 1.4;
    }
    .msg-self { color: var(--nap-theme-info, #00f0ff); }
    .msg-other { color: var(--nap-theme-success, #39ff14); }
    .msg-system { color: var(--nap-theme-muted, #555); font-style: italic; }
    .msg-time { color: var(--nap-theme-muted, #333); margin-right: 4px; }
    #input-bar {
      display: flex;
      border-top: 1px solid var(--nap-theme-border, #2a2a3a);
      background: var(--nap-theme-surface-1, #12121a);
    }
    #input-bar input {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--nap-theme-text, #e0e0e0);
      padding: 6px 8px;
      font-family: inherit;
      font-size: 11px;
      outline: none;
    }
    #input-bar input::placeholder { color: var(--nap-theme-muted, #333); }
    #input-bar button {
      background: var(--nap-theme-primary-soft, #00f0ff20);
      color: var(--nap-theme-primary, #00f0ff);
      border: none;
      border-left: 1px solid var(--nap-theme-border, #2a2a3a);
      padding: 6px 12px;
      font-family: inherit;
      font-size: 11px;
      cursor: pointer;
    }
    #input-bar button:hover { background: var(--nap-theme-primary-soft, #00f0ff30); }
  </style>
</head>
<body>
  <div id="app">
    <!-- id="chat-status" — v1.12 contract: E2E spec asserts textContent === 'ready' -->
    <div id="chat-status">connecting...</div>
    <div id="messages"></div>
    <div id="input-bar">
      <input id="msg-input" type="text" placeholder="type a message..." autocomplete="off" />
      <button id="send-btn">send</button>
    </div>
  </div>
  <script type="module" src="./src/main.ts"></script>
</body>
</html>
