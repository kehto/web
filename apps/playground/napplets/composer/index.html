<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="napplet-napp-type" content="demo-composer" />
  <title>Composer Napplet</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'JetBrains Mono', monospace;
      background: var(--nap-theme-background, #f6f5ef);
      color: var(--nap-theme-text, #1c1c1c);
      font-size: 11px;
      height: 100vh;
      overflow: hidden;
    }
    #app {
      height: 100%;
      display: flex;
      flex-direction: column;
      padding: 8px;
      gap: 6px;
    }
    .composer-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .composer-status {
      color: var(--nap-theme-muted, #666);
      font-size: 10px;
      padding: 2px 0;
    }
    .composer-log {
      flex: 1;
      overflow-y: auto;
      background: var(--nap-theme-surface-2, #ece9df);
      border: 1px solid var(--nap-theme-border, #c9c6ba);
      padding: 6px;
      font-size: 10px;
    }
    input[type="text"] {
      flex: 1;
      background: var(--nap-theme-surface-1, #f4f1e7);
      border: 1px solid var(--nap-theme-border, #cfcabf);
      color: var(--nap-theme-text, #1c1c1c);
      padding: 4px 6px;
      font-family: inherit;
      font-size: 11px;
    }
    input[type="text"]::placeholder {
      color: var(--nap-theme-muted, #666);
    }
    input[type="checkbox"] {
      accent-color: var(--nap-theme-success, #39ff14);
    }
    label {
      display: flex;
      align-items: center;
      gap: 4px;
      color: var(--nap-theme-muted, #666);
      cursor: pointer;
    }
    button {
      background: var(--nap-theme-surface-1, #f4f1e7);
      border: 1px solid var(--nap-theme-border, #cfcabf);
      color: var(--nap-theme-text, #1c1c1c);
      padding: 4px 12px;
      font-family: inherit;
      font-size: 11px;
      cursor: pointer;
    }
    button:hover {
      background: var(--nap-theme-surface-3, #e6e1d2);
    }
    .composer-log-entry {
      padding: 1px 0;
      line-height: 1.4;
      color: var(--nap-theme-muted, #666);
    }
    #composer-log {
      flex: 1;
      overflow-y: auto;
      background: var(--nap-theme-surface-2, #ece9df);
      border: 1px solid var(--nap-theme-border, #c9c6ba);
      padding: 6px;
      font-size: 10px;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="composer-row">
      <span id="composer-status" class="composer-status">connecting...</span>
    </div>
    <div class="composer-row">
      <input id="composer-input" type="text" placeholder="Message content (kind:1)" />
    </div>
    <div class="composer-row">
      <label>
        <input id="composer-encrypted-toggle" type="checkbox" />
        Encrypted (NIP-44)
      </label>
    </div>
    <div class="composer-row">
      <input id="composer-recipient" type="text" placeholder="Recipient hex pubkey (encrypted only)" />
    </div>
    <div class="composer-row">
      <button id="composer-publish-btn">Publish</button>
    </div>
    <div id="composer-log"></div>
  </div>
  <script type="module" src="./src/main.ts"></script>
</body>
</html>
