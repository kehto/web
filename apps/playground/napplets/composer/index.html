<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="napplet-napp-type" content="demo-composer" />
  <title>Composer Napplet</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'JetBrains Mono', monospace;
      background: #0a0a0f;
      color: #e0e0e0;
      font-size: 11px;
      height: 100vh;
      overflow: hidden;
    }
    #app {
      height: 100%;
      display: flex;
      flex-direction: column;
      padding: 8px;
      gap: 6px;
    }
    .composer-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .composer-status {
      color: #888;
      font-size: 10px;
      padding: 2px 0;
    }
    .composer-log {
      flex: 1;
      overflow-y: auto;
      background: #0d0d14;
      border: 1px solid #1e1e2e;
      padding: 6px;
      font-size: 10px;
    }
    input[type="text"] {
      flex: 1;
      background: #12121a;
      border: 1px solid #2a2a3a;
      color: #e0e0e0;
      padding: 4px 6px;
      font-family: inherit;
      font-size: 11px;
    }
    input[type="text"]::placeholder {
      color: #444;
    }
    input[type="checkbox"] {
      accent-color: #39ff14;
    }
    label {
      display: flex;
      align-items: center;
      gap: 4px;
      color: #aaa;
      cursor: pointer;
    }
    button {
      background: #1a1a2e;
      border: 1px solid #3a3a5a;
      color: #e0e0e0;
      padding: 4px 12px;
      font-family: inherit;
      font-size: 11px;
      cursor: pointer;
    }
    button:hover {
      background: #2a2a4e;
    }
    .composer-log-entry {
      padding: 1px 0;
      line-height: 1.4;
      color: #888;
    }
    #composer-log {
      flex: 1;
      overflow-y: auto;
      background: #0d0d14;
      border: 1px solid #1e1e2e;
      padding: 6px;
      font-size: 10px;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="composer-row">
      <span id="composer-status" class="composer-status">connecting...</span>
    </div>
    <div class="composer-row">
      <input id="composer-input" type="text" placeholder="Message content (kind:1)" />
    </div>
    <div class="composer-row">
      <label>
        <input id="composer-encrypted-toggle" type="checkbox" />
        Encrypted (NIP-44)
      </label>
    </div>
    <div class="composer-row">
      <input id="composer-recipient" type="text" placeholder="Recipient hex pubkey (encrypted only)" />
    </div>
    <div class="composer-row">
      <button id="composer-publish-btn">Publish</button>
    </div>
    <div id="composer-log"></div>
  </div>
  <script type="module" src="./src/main.ts"></script>
</body>
</html>
