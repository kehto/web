<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="napplet-napp-type" content="demo-preferences" />
  <title>Preferences Napplet</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'JetBrains Mono', monospace;
      background: #0a0a0f;
      color: #e0e0e0;
      font-size: 11px;
      height: 100vh;
      overflow: hidden;
    }
    #app {
      height: 100%;
      display: flex;
      flex-direction: column;
      padding: 8px;
      gap: 8px;
    }
    .preferences-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    label {
      color: #888;
      min-width: 90px;
      font-size: 10px;
    }
    input[type="text"] {
      background: #12121a;
      border: 1px solid #2a2a3a;
      color: #e0e0e0;
      font-family: inherit;
      font-size: 11px;
      padding: 3px 6px;
      flex: 1;
    }
    input[type="text"]:focus {
      outline: none;
      border-color: #39ff14;
    }
    button {
      background: #12121a;
      border: 1px solid #2a2a3a;
      color: #e0e0e0;
      font-family: inherit;
      font-size: 11px;
      padding: 4px 12px;
      cursor: pointer;
    }
    button:hover {
      border-color: #39ff14;
      color: #39ff14;
    }
    #preferences-status {
      font-size: 10px;
      color: #888;
    }
    #preferences-log {
      flex: 1;
      overflow-y: auto;
      padding-top: 4px;
      border-top: 1px solid #2a2a3a;
    }
    .preferences-log-entry {
      padding: 2px 0;
      line-height: 1.4;
      color: #555;
      font-size: 10px;
    }
    #preferences-theme-applied {
      color: #888;
      font-size: 10px;
      padding: 2px 4px;
      background: rgba(255, 255, 255, 0.04);
      border-radius: 2px;
    }
    .theme-applied-row {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 0;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="preferences-row">
      <span id="preferences-status">connecting...</span>
    </div>
    <div class="preferences-row">
      <label for="pref-display-name">Display Name</label>
      <input id="pref-display-name" type="text" placeholder="alice" />
    </div>
    <div class="preferences-row">
      <label for="pref-theme-preference">Theme</label>
      <input id="pref-theme-preference" type="text" placeholder="dark" />
    </div>
    <div class="preferences-row">
      <button id="preferences-save-btn">Save</button>
    </div>
    <div class="theme-applied-row">
      <span style="color:#888;font-size:10px">theme:</span>
      <span id="preferences-theme-applied"></span>
    </div>
    <div id="preferences-log"></div>
  </div>
  <script type="module" src="./src/main.ts"></script>
</body>
</html>
