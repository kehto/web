<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="napplet-napp-type" content="demo-config" />
  <title>Config Demo Napplet</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'JetBrains Mono', monospace;
      background: #0a0a0f;
      color: #e0e0e0;
      font-size: 11px;
      height: 100vh;
      overflow: hidden;
    }
    #app {
      height: 100%;
      display: flex;
      flex-direction: column;
      padding: 8px;
      gap: 6px;
    }
    #config-demo-status { color: #888; font-size: 10px; }
    #config-demo-values {
      flex: 1;
      overflow-y: auto;
      padding: 6px;
      border: 1px solid #1e1e2e;
      background: #0d0d14;
      font-size: 10px;
      white-space: pre-wrap;
      word-break: break-all;
      color: #b0b0c0;
    }
    #config-demo-log {
      max-height: 80px;
      overflow-y: auto;
      background: #0d0d14;
      border: 1px solid #1e1e2e;
      padding: 6px;
      font-size: 10px;
      color: #888;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="config-demo-status">connecting...</div>
    <!-- sentinel the E2E spec reads via frameLocator (Plan 39-05) -->
    <pre id="config-demo-values">(no values yet)</pre>
    <div id="config-demo-log"></div>
  </div>
  <script type="module" src="./src/main.ts"></script>
</body>
</html>
